services:
  gateway:
    image: ghcr.io/ukstevem/platform-portal/gateway:latest
    container_name: platform_gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3000}:80"
    volumes:
      - ${SCANNER_DATA_DIR}:/data/scanner:ro
    depends_on:
      - portal
      - jobcards
      - documents
      - timesheets
      - operations

  portal:
    image: ghcr.io/ukstevem/platform-portal/portal:latest
    container_name: platform_portal
    restart: unless-stopped
    environment:
      - APP_NAME=portal
      - PORT=3000

  jobcards:
    image: ghcr.io/ukstevem/platform-portal/jobcards:latest
    container_name: platform_jobcards
    restart: unless-stopped
    environment:
      - APP_NAME=jobcards
      - PORT=3001

  documents:
    image: ghcr.io/ukstevem/platform-portal/documents:latest
    container_name: platform_documents
    restart: unless-stopped
    environment:
      - APP_NAME=documents
      - PORT=3002
      - DOC_NAS_ROOT=/data/input
    volumes:
      - ${HOST_DOC_ROOT:-/tmp}:/data/input:ro

  timesheets:
    image: ghcr.io/ukstevem/platform-portal/timesheets:latest
    container_name: platform_timesheets
    restart: unless-stopped
    environment:
      - APP_NAME=timesheets
      - PORT=3003

  operations:
    image: ghcr.io/ukstevem/platform-portal/operations:latest
    container_name: platform_operations
    restart: unless-stopped
    environment:
      - APP_NAME=operations
      - PORT=3004

  scanner:
    image: ghcr.io/ukstevem/platform-portal/scanner:latest
    container_name: platform_scanner
    restart: unless-stopped
    environment:
      - APP_NAME=scanner
      - PORT=3005
      - SCANNER_INBOX_DIR=/data/scanner/inbox
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SECRET_KEY}
    volumes:
      - ${SCANNER_DATA_DIR}:/data/scanner

  scanner-worker:
    image: ghcr.io/ukstevem/platform-portal/scanner-worker:latest
    container_name: platform_scanner_worker
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SECRET_KEY}
      - SCANNER_INBOX_DIR=/data/scanner/inbox
      - SCANNER_FILED_DIR=/data/scanner/filed
      - POLL_INTERVAL_MS=5000
    volumes:
      - ${SCANNER_DATA_DIR}:/data/scanner

