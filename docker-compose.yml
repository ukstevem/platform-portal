services:
  gateway:
    image: nginx:1.27-alpine
    container_name: platform_gateway
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - portal
      - jobcards
      - documents
      - timesheets
      - operations

  portal:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_portal
    working_dir: /repo
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/portal dev --hostname 0.0.0.0 --port 3000"]
    volumes:
      - ./:/repo
      - portal_pnpm_store:/repo/.pnpm-store
      - portal_root_nm:/repo/node_modules
      - portal_node_modules:/repo/apps/portal/node_modules

  jobcards:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_jobcards
    working_dir: /repo
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/jobcards dev --hostname 0.0.0.0 --port 3001"]
    volumes:
      - ./:/repo
      - jobcards_pnpm_store:/repo/.pnpm-store
      - jobcards_root_nm:/repo/node_modules
      - jobcards_node_modules:/repo/apps/jobcards/node_modules

  documents:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_documents
    working_dir: /repo
    env_file: .env
    environment:
      DOC_NAS_ROOT: /data/input
      WATCHPACK_POLLING: "true"
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/documents dev --hostname 0.0.0.0 --port 3002"]
    volumes:
      - ./:/repo
      - documents_pnpm_store:/repo/.pnpm-store
      - documents_root_nm:/repo/node_modules
      - documents_node_modules:/repo/apps/documents/node_modules
      - ${HOST_DOC_ROOT}:/data/input

  timesheets:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_timesheets
    working_dir: /repo
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/timesheets dev --hostname 0.0.0.0 --port 3003"]
    volumes:
      - ./:/repo
      - timesheets_pnpm_store:/repo/.pnpm-store
      - timesheets_root_nm:/repo/node_modules
      - timesheets_node_modules:/repo/apps/timesheets/node_modules

  operations:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_operations
    working_dir: /repo
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/operations dev --hostname 0.0.0.0 --port 3004"]
    volumes:
      - ./:/repo
      - operations_pnpm_store:/repo/.pnpm-store
      - operations_root_nm:/repo/node_modules
      - operations_node_modules:/repo/apps/operations/node_modules

  scanner:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_scanner
    working_dir: /repo
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/scanner dev --hostname 0.0.0.0 --port 3005"]
    volumes:
      - ./:/repo
      - scanner_pnpm_store:/repo/.pnpm-store
      - scanner_root_nm:/repo/node_modules
      - scanner_node_modules:/repo/apps/scanner/node_modules

  laserquote:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_laserquote
    working_dir: /repo
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/laserquote dev --hostname 0.0.0.0 --port 3006"]
    volumes:
      - ./:/repo
      - laserquote_pnpm_store:/repo/.pnpm-store
      - laserquote_root_nm:/repo/node_modules
      - laserquote_node_modules:/repo/apps/laserquote/node_modules

  assembly-viewer:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_assembly_viewer
    working_dir: /repo
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
      DOC_SERVICE_URL: ${DOC_SERVICE_URL:-http://10.0.0.75:80}
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/assembly-viewer dev --hostname 0.0.0.0 --port 3007"]
    volumes:
      - ./:/repo
      - assembly_viewer_pnpm_store:/repo/.pnpm-store
      - assembly_viewer_root_nm:/repo/node_modules
      - assembly_viewer_node_modules:/repo/apps/assembly-viewer/node_modules

  matl-cert:
    image: node:20-alpine
    container_name: platform_matl_cert
    working_dir: /app
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command:
      ["sh", "-c", "npm install && npx next dev --hostname 0.0.0.0 --port 3010"]
    volumes:
      - ${MATL_CERT_APP}:/app
      - matl_cert_node_modules:/app/node_modules
      - matl_cert_next:/app/.next
    ports:
      - "3010:3010"

  nesting:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.dev
    container_name: platform_nesting
    working_dir: /repo
    env_file: .env
    environment:
      WATCHPACK_POLLING: "true"
      NESTING_SERVICE_URL: ${NESTING_SERVICE_URL:-http://10.0.0.74:8001}
      DOC_SERVICE_URL: ${DOC_SERVICE_URL:-http://10.0.0.74:3000}
    command:
      ["sh", "-lc", "corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install && pnpm -C apps/nesting dev --hostname 0.0.0.0 --port 3008"]
    volumes:
      - ./:/repo
      - nesting_pnpm_store:/repo/.pnpm-store
      - nesting_root_nm:/repo/node_modules
      - nesting_node_modules:/repo/apps/nesting/node_modules

volumes:
  portal_pnpm_store:
  portal_root_nm:
  portal_node_modules:
  jobcards_pnpm_store:
  jobcards_root_nm:
  jobcards_node_modules:
  documents_pnpm_store:
  documents_root_nm:
  documents_node_modules:
  timesheets_pnpm_store:
  timesheets_root_nm:
  timesheets_node_modules:
  operations_pnpm_store:
  operations_root_nm:
  operations_node_modules:
  scanner_pnpm_store:
  scanner_root_nm:
  scanner_node_modules:
  laserquote_pnpm_store:
  laserquote_root_nm:
  laserquote_node_modules:
  assembly_viewer_pnpm_store:
  assembly_viewer_root_nm:
  assembly_viewer_node_modules:
  nesting_pnpm_store:
  nesting_root_nm:
  nesting_node_modules:
  matl_cert_node_modules:
  matl_cert_next:
