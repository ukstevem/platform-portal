services:
  gateway:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.prod
    container_name: platform_gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3080}:80"
    volumes:
      - ${SCANNER_DATA_DIR}:/data/scanner:ro
    depends_on:
      - portal
      - jobcards
      - documents
      - timesheets
      - operations

  portal:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: portal
        APP_PORT: "3000"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_portal
    restart: unless-stopped
    environment:
      - APP_NAME=portal
      - PORT=3000

  jobcards:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: jobcards
        APP_PORT: "3001"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_jobcards
    restart: unless-stopped
    environment:
      - APP_NAME=jobcards
      - PORT=3001

  documents:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: documents
        APP_PORT: "3002"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_DOC_GATEWAY_BASE_URL: ${NEXT_PUBLIC_DOC_GATEWAY_BASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_documents
    restart: unless-stopped
    environment:
      - APP_NAME=documents
      - PORT=3002
      - DOC_NAS_ROOT=/data/input
    volumes:
      - ${HOST_DOC_ROOT:-/tmp}:/data/input:ro

  timesheets:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: timesheets
        APP_PORT: "3003"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_timesheets
    restart: unless-stopped
    environment:
      - APP_NAME=timesheets
      - PORT=3003

  operations:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: operations
        APP_PORT: "3004"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_operations
    restart: unless-stopped
    environment:
      - APP_NAME=operations
      - PORT=3004

  scanner:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: scanner
        APP_PORT: "3005"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_scanner
    restart: unless-stopped
    environment:
      - APP_NAME=scanner
      - PORT=3005
      - SCANNER_INBOX_DIR=/data/scanner/inbox
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SECRET_KEY}
    volumes:
      - ${SCANNER_DATA_DIR}:/data/scanner

  scanner-worker:
    build:
      context: ./services/scanner-worker
      dockerfile: Dockerfile
    container_name: platform_scanner_worker
    restart: unless-stopped
    environment:
      - SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SECRET_KEY}
      - SCANNER_INBOX_DIR=/data/scanner/inbox
      - SCANNER_FILED_DIR=/data/scanner/filed
      - POLL_INTERVAL_MS=5000
    volumes:
      - ${SCANNER_DATA_DIR}:/data/scanner

