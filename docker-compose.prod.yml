services:
  gateway:
    image: nginx:1.27-alpine
    container_name: platform_gateway
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - portal
      - jobcards
      - documents
      - timesheets

  portal:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: portal
        APP_PORT: "3000"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_portal
    restart: unless-stopped
    environment:
      - APP_NAME=portal
      - PORT=3000
    env_file: .env.production

  jobcards:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: jobcards
        APP_PORT: "3001"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_jobcards
    restart: unless-stopped
    environment:
      - APP_NAME=jobcards
      - PORT=3001
    env_file: .env.production

  documents:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: documents
        APP_PORT: "3002"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_DOC_GATEWAY_BASE_URL: ${NEXT_PUBLIC_DOC_GATEWAY_BASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_documents
    restart: unless-stopped
    environment:
      - APP_NAME=documents
      - PORT=3002
      - DOC_NAS_ROOT=/data/input
    env_file: .env.production
    volumes:
      - ${HOST_DOC_ROOT:-/dev/null}:/data/input:ro

  timesheets:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: timesheets
        APP_PORT: "3003"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_timesheets
    restart: unless-stopped
    environment:
      - APP_NAME=timesheets
      - PORT=3003
    env_file: .env.production
