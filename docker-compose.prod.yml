services:
  gateway:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.prod
    container_name: platform_gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-3080}:80"
    depends_on:
      - portal
      - jobcards
      - documents
      - timesheets

  portal:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: portal
        APP_PORT: "3000"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_portal
    restart: unless-stopped
    environment:
      - APP_NAME=portal
      - PORT=3000

  jobcards:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: jobcards
        APP_PORT: "3001"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_jobcards
    restart: unless-stopped
    environment:
      - APP_NAME=jobcards
      - PORT=3001

  documents:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: documents
        APP_PORT: "3002"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_DOC_GATEWAY_BASE_URL: ${NEXT_PUBLIC_DOC_GATEWAY_BASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_documents
    restart: unless-stopped
    environment:
      - APP_NAME=documents
      - PORT=3002
      - DOC_NAS_ROOT=/data/input
    volumes:
      - ${HOST_DOC_ROOT:-/tmp}:/data/input:ro

  timesheets:
    build:
      context: .
      dockerfile: docker/node/Dockerfile.prod
      args:
        APP_NAME: timesheets
        APP_PORT: "3003"
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: platform_timesheets
    restart: unless-stopped
    environment:
      - APP_NAME=timesheets
      - PORT=3003
