server {
  listen 80;

  client_max_body_size 50m;

  # Scanner filed documents
  location /files/scanner/ {
    alias /data/scanner/filed/;
    autoindex on;
    add_header Content-Disposition inline;
    add_header Cache-Control "public, max-age=3600";
  }

  # Future apps add locations here, e.g.:
  # location /files/documents/ {
  #   alias /data/documents/;
  #   autoindex on;
  # }

  # Health check
  location /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
