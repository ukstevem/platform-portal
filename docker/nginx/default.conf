map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Extract port from Host header (e.g. localhost:3000 -> 3000)
map $http_host $forwarded_port {
  default 80;
  "~:(\d+)$" $1;
}

upstream portal_upstream   { server portal:3000; }
upstream jobcards_upstream { server jobcards:3001; }
upstream docs_upstream     { server documents:3002; }
upstream ts_upstream       { server timesheets:3003; }
upstream ops_upstream     { server operations:3004; }
server {
  listen 80;

  # Docker DNS — used for late-resolving upstreams (scanner)
  resolver 127.0.0.11 valid=10s;

  # Allow uploads up to 50 MB (nginx default is only 1 MB)
  client_max_body_size 50m;

  # Allow time for Turbopack first-compile in dev
  proxy_connect_timeout 30s;
  proxy_read_timeout 60s;
  proxy_send_timeout 30s;

  # Normalize no-trailing-slash to trailing-slash (relative redirect)
  location = /jobcards   { return 301 /jobcards/; }
  location = /documents  { return 301 /documents/; }
  location = /timesheets  { return 301 /timesheets/; }
  location = /operations { return 301 /operations/; }
  location = /scanner    { return 301 /scanner/; }

  # File server — all file serving routed to dedicated fileserver service
  location /files/ {
    set $fileserver_backend http://fileserver:80;
    proxy_pass $fileserver_backend;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $forwarded_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://portal_upstream;
    proxy_http_version 1.1;

    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $forwarded_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }

  location /jobcards/ {
    proxy_pass http://jobcards_upstream;
    proxy_http_version 1.1;

    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $forwarded_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }

  location /documents/ {
    proxy_pass http://docs_upstream;
    proxy_http_version 1.1;

    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $forwarded_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }

  location /timesheets/ {
    proxy_pass http://ts_upstream;
    proxy_http_version 1.1;

    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $forwarded_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }

  location /operations/ {
    proxy_pass http://ops_upstream;
    proxy_http_version 1.1;

    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $forwarded_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }

  location /scanner/ {
    set $scanner_backend http://scanner:3005;
    proxy_pass $scanner_backend;
    proxy_http_version 1.1;

    proxy_redirect off;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Port  $forwarded_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;
  }
}
