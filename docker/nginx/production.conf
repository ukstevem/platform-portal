upstream portal_upstream   { server portal:3000; }
upstream jobcards_upstream { server jobcards:3001; }
upstream docs_upstream     { server documents:3002; }
upstream ts_upstream       { server timesheets:3003; }
upstream ops_upstream     { server operations:3004; }
server {
  listen 80;

  resolver 127.0.0.11 valid=10s;

  client_max_body_size 50m;

  proxy_connect_timeout 10s;
  proxy_read_timeout 30s;
  proxy_send_timeout 30s;

  # Normalize no-trailing-slash to trailing-slash (preserve host:port)
  location = /jobcards   { return 301 $scheme://$http_host/jobcards/; }
  location = /documents  { return 301 $scheme://$http_host/documents/; }
  location = /timesheets { return 301 $scheme://$http_host/timesheets/; }
  location = /operations { return 301 $scheme://$http_host/operations/; }
  location = /scanner    { return 301 $scheme://$http_host/scanner/; }
  location = /laserquote { return 301 $scheme://$http_host/laserquote/; }
  location = /assembly   { return 301 $scheme://$http_host/assembly/; }
  location = /nesting    { return 301 $scheme://$http_host/nesting/; }

  location / {
    proxy_pass http://portal_upstream;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /jobcards/ {
    proxy_pass http://jobcards_upstream;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /documents/ {
    proxy_pass http://docs_upstream;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /timesheets/ {
    proxy_pass http://ts_upstream;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /operations/ {
    proxy_pass http://ops_upstream;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /scanner/ {
    set $scanner_backend http://scanner:3005;
    proxy_pass $scanner_backend;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /laserquote/ {
    set $laserquote_backend http://laserquote:3006;
    proxy_pass $laserquote_backend;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /assembly/ {
    set $assembly_backend http://assembly-viewer:3007;
    proxy_pass $assembly_backend;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }

  location /nesting/ {
    set $nesting_backend http://nesting:3008;
    proxy_pass $nesting_backend;
    proxy_http_version 1.1;
    proxy_redirect off;
    proxy_read_timeout 180s;
    proxy_set_header Host              $http_host;
    proxy_set_header X-Forwarded-Host  $http_host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  }
}
